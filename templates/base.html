  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>{% block pagetitle %}{% endblock %}</title>
    <style>
      @keyframes scrollVertical {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-50%);
        }
      }

      .animate-scroll {
        animation: scrollVertical 15s linear infinite;
      }
    </style>
  </head>
<body>
  {% include 'includes/announcement.html' %}
  {% include 'includes/navbar.html' %}

  {% block content %}{% endblock %}

  {% include 'includes/footer.html' %}
  <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script>
      let currentSlide = 0;
      const slides = document.querySelectorAll(".slide");
      const dots = document.querySelectorAll(".dot");
      let interval;

      function showSlide(index) {
        slides.forEach((slide, i) => {
          slide.classList.remove("opacity-100", "translate-x-0");
          slide.classList.add("opacity-0", "translate-x-full");

          dots[i].classList.remove("bg-white");
          dots[i].classList.add("bg-white/50");
        });

        slides[index].classList.remove("translate-x-full");
        slides[index].classList.add("opacity-100", "translate-x-0");

        dots[index].classList.add("bg-white");
      }

      function nextSlide() {
        currentSlide = (currentSlide + 1) % slides.length;
        showSlide(currentSlide);
      }

      function prevSlide() {
        currentSlide = (currentSlide - 1 + slides.length) % slides.length;
        showSlide(currentSlide);
      }

      // Dot click
      dots.forEach((dot, i) => {
        dot.addEventListener("click", () => {
          currentSlide = i;
          showSlide(currentSlide);
        });
      });

      // Auto slide
      function startAutoSlide() {
        interval = setInterval(nextSlide, 4000);
      }

      function stopAutoSlide() {
        clearInterval(interval);
      }

      // Swipe support
      let startX = 0;

      const slider = document.getElementById("slider");

      slider.addEventListener("touchstart", (e) => {
        startX = e.touches[0].clientX;
        stopAutoSlide();
      });

      slider.addEventListener("touchend", (e) => {
        let endX = e.changedTouches[0].clientX;

        if (startX - endX > 50) nextSlide();
        if (endX - startX > 50) prevSlide();

        startAutoSlide();
      });

      // Pause on hover
      slider.addEventListener("mouseenter", stopAutoSlide);
      slider.addEventListener("mouseleave", startAutoSlide);

      // Init
      showSlide(currentSlide);
      startAutoSlide();
    </script>
</body>
